:root {
  --bg: #1a1610;
  --bg2: #221e12;
  --bg3: #2a2416;
  --gold: #c9a84b;
  --gold-dim: #8a6f2e;
  --gold-light: #e8c96a;
  --text: #d4c89a;
  --text-dim: #8a7d5a;
  --text-muted: #5a5038;
  --border: #3a3020;
  --border-gold: #6a5520;
  --released-col: #5aaa5a;
  --upcoming-col: #c8902a;
  --major-col: #c9a84b;
  --line-col: #6a5520;
  --radius: 4px;

  --track-top: 420px;   /* px from top of the scroll area where the line sits */
  --year-gap: 900px;    /* px per year */
  --month-gap: 72px;    /* px per month (year-gap/12 ≈ 75) */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: var(--bg2);
  border-bottom: 2px solid var(--border-gold);
  padding: 20px 24px 16px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
.header-deco {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 8px;
}
.deco-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border-gold), transparent);
  max-width: 220px;
}
.deco-gem {
  width: 9px;
  height: 9px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 10px var(--gold);
}
header h1 {
  font-family: 'MedievalSharp', 'Palatino Linotype', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: var(--gold-light);
  letter-spacing: 0.05em;
  text-shadow: 0 0 24px rgba(201,162,39,0.4), 0 2px 4px rgba(0,0,0,0.8);
  line-height: 1.1;
  margin: 0;
}
header .subtitle {
  color: var(--text-dim);
  font-style: italic;
  font-size: 0.85rem;
  margin-top: 6px;
  letter-spacing: 0.04em;
}

/* ── TOP BAR (title + legend) ── */
.top-bar {
  padding: 18px 24px 12px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.page-title {
  font-size: 1.5rem; color: var(--gold-light); letter-spacing: 0.06em;
  text-shadow: 0 0 16px rgba(201,168,75,0.2);
}
.page-sub { font-size: 0.75rem; color: var(--text-dim); font-family: 'Courier New', monospace; margin-top: 2px; }
.legend {
  margin-left: auto; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: var(--text-dim); font-family: 'Courier New', monospace;
}
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-dot.released { background: var(--released-col); }
.legend-dot.upcoming { background: var(--upcoming-col); }
.legend-dot.major    { background: var(--major-col); box-shadow: 0 0 5px rgba(201,168,75,0.5); }

/* ── ZOOM BAR ── */
.zoom-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 20px 4px; justify-content: flex-end;
}
.zoom-btn {
  background: var(--bg2); border: 1px solid var(--border-gold);
  color: var(--gold); width: 28px; height: 28px; border-radius: var(--radius);
  cursor: pointer; font-size: 1rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.zoom-btn:hover { background: var(--bg3); }
.zoom-label {
  font-size: 0.7rem; color: var(--text-muted); font-family: 'Courier New', monospace;
  min-width: 38px; text-align: center;
}

/* ── SCROLL HINT ── */
.scroll-hint {
  text-align: center; font-size: 0.72rem; color: var(--text-muted);
  font-family: 'Courier New', monospace; padding-bottom: 8px; letter-spacing: 0.06em;
}

/* ── TIMELINE OUTER ── */
.tl-outer {
  overflow-x: auto;
  overflow-y: hidden;
  cursor: grab;
  user-select: none;
  position: relative;
  -webkit-overflow-scrolling: touch;
  flex: 1 1 0;
  min-height: 0;
}
.tl-outer:active { cursor: grabbing; }
.tl-outer::-webkit-scrollbar { height: 6px; }
.tl-outer::-webkit-scrollbar-track { background: var(--bg2); }
.tl-outer::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }

/* ── TIMELINE CANVAS ── */
.tl-canvas {
  position: relative;
  /* width set by JS */
  min-height: 600px;
  flex-shrink: 0;
}

/* ── TRACK LINE ── */
.tl-line {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(to right, transparent 0px, var(--line-col) 60px, var(--gold-dim) 50%, var(--line-col) calc(100% - 60px), transparent 100%);
}

/* ── YEAR LABELS ── */
.year-label {
  position: absolute;
  font-size: 2.2rem;
  font-weight: bold;
  color: rgba(201,168,75,0.15);
  font-family: 'Georgia', serif;
  letter-spacing: 0.1em;
  pointer-events: none;
  text-shadow: 0 0 30px rgba(201,168,75,0.1);
}

/* ── MONTH TICKS ── */
.month-tick {
  position: absolute;
  width: 1px;
  height: 20px;
  background: var(--border-gold);
  opacity: 0.5;
}
.month-label {
  position: absolute;
  font-size: 0.62rem;
  color: var(--text-muted);
  font-family: 'Courier New', monospace;
  transform: translateX(-50%);
  white-space: nowrap;
}

/* ── COMING SOON ARROW — removed, handled inline ── */

/* ── CONNECTOR LINE ── */
.connector {
  position: absolute;
  width: 2px;
  background: var(--border-gold);
  opacity: 0.6;
  pointer-events: none;
}

/* ── EVENT NODE ── */
.event-node {
  position: absolute;
  transform: translateX(-50%);
  text-align: center;
  cursor: pointer;
  z-index: 10;
}

.event-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 2px solid var(--bg);
  margin: 0 auto;
  position: relative;
  z-index: 2;
  transition: transform 0.15s;

.event-dot.released { background: var(--released-col); }
.event-dot.upcoming { background: var(--upcoming-col); box-shadow: 0 0 5px rgba(200,144,42,0.4); }
.event-dot.major    { background: var(--major-col); width: 14px; height: 14px; box-shadow: 0 0 8px rgba(201,168,75,0.6); }

.event-node:hover .event-dot { transform: scale(1.4); }

.event-img {
  display: block;
  width: 42px; height: 42px;
  object-fit: contain;
  image-rendering: pixelated;
  margin: 0 auto 4px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
  transition: filter 0.15s, transform 0.15s;
}
.event-node.upcoming .event-img {
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) grayscale(0.5) brightness(0.7);

.event-node:hover .event-img {

.event-title {

.event-node.released .event-title { color: var(--text); }

.event-date {

.release-note {

const START_PX    = 80;  // left padding
const YEAR_PX     = 900; // px per year
const MONTH_PX    = YEAR_PX / 12;

// "Current date" on Lost City: 7 Sep 2004
const NOW_DATE = new Date(2004, 8, 7); // month is 0-indexed

// RS2 start: 1 Jan 2004 (our timeline start)
const TIMELINE_START = new Date(2004, 0, 1);
// Timeline end: 31 Dec 2005
const TIMELINE_END   = new Date(2005, 11, 31);

function fmtDate(dateStr) {
  // Format 'YYYY-MM-DD' using the user's locale (respects UK vs US date order)
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
}

function dateToPx(dateStr) {
  // Parse "DD Mon YYYY" or "Mon YYYY" or Date object
  const d = typeof dateStr === 'string' ? parseDate(dateStr) : dateStr;
  const ms = d - TIMELINE_START;
  const totalMs = TIMELINE_END - TIMELINE_START;
  const totalPx = YEAR_PX * 2;
  return START_PX + (ms / totalMs) * totalPx;
}

function parseDate(s) {
  // accepts "29 Mar 2004", "Mar 2004" (uses 15th), "2004-03-29"
  if (s.includes('-')) return new Date(s);
  const parts = s.trim().split(/\s+/);
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  if (parts.length === 3) {
    return new Date(parseInt(parts[2]), months[parts[1]], parseInt(parts[0]));
  } else {
    return new Date(parseInt(parts[1]), months[parts[0]], 15);
  }
}

// BUILD
// ─────────────────────────────────────────
const canvas = document.getElementById('tlCanvas');
const outer  = document.getElementById('tlOuter');
// Canvas is 2x outer height. Line sits at the 3/4 mark so above-cards
// have a full outer-height of space and below-cards have a quarter.
// Fixed canvas layout: 500px above track line for tallest above-cards,
// 420px below for tallest below-cards (max offset 225 + NODE_H 105 = 330px + breathing room)
// Extra padding lets you pan so the topmost/bottommost nodes reach the screen edge
const EXTRA_PAD  = outer.clientHeight;
const ABOVE_ROOM = 500 + EXTRA_PAD;
const BELOW_ROOM = 420 + EXTRA_PAD;
const CANVAS_H   = ABOVE_ROOM + BELOW_ROOM;
const TRACK_TOP  = ABOVE_ROOM;

const TOTAL_PX = START_PX + YEAR_PX * 2 + 80;
canvas.style.width  = TOTAL_PX + 'px';
canvas.style.height = CANVAS_H + 'px';

// Track line — created in JS so the extraAbove shift can move it via style.top
const tlLine = document.createElement('div');
tlLine.className = 'tl-line';
tlLine.style.top = TRACK_TOP + 'px';
canvas.appendChild(tlLine);

// Year labels
function addYearLabel(year, x) {
  const el = document.createElement('div');
  el.className = 'year-label';
  el.textContent = year;
  el.style.left = x + 'px';
  el.style.top  = (TRACK_TOP - 48) + 'px';
  canvas.appendChild(el);
}
addYearLabel('2004', START_PX + 10);
addYearLabel('2005', START_PX + YEAR_PX + 10);

// Month ticks + labels
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
for (let year = 2004; year <= 2005; year++) {
  for (let m = 0; m < 12; m++) {
    const d = new Date(year, m, 1);
    const x = dateToPx(d);
    const tick = document.createElement('div');
    tick.className = 'month-tick';
    tick.style.left = x + 'px';
    tick.style.top  = (TRACK_TOP - 10) + 'px';
    canvas.appendChild(tick);

    const lbl = document.createElement('div');
    lbl.className = 'month-label';
    lbl.textContent = months[m];
    lbl.style.left = x + 'px';
    lbl.style.top  = (TRACK_TOP + 14) + 'px';
    canvas.appendChild(lbl);
  }
}

// Revision boundary markers

const nowX = dateToPx(NOW_DATE);

// vertical stem above the line
const nowStem = document.createElement('div');
nowStem.style.cssText = `
  position:absolute; left:${nowX}px; top:${TRACK_TOP - 54}px;
  width:2px; height:54px;
  background:var(--released-col);
  box-shadow: 0 0 6px rgba(90,170,90,0.4);
  z-index:200;
`;
canvas.appendChild(nowStem);

// downward arrowhead sitting on the line
const nowArrow = document.createElement('div');
nowArrow.style.cssText = `
  position:absolute;
  left:${nowX}px; top:${TRACK_TOP - 2}px;
  transform:translateX(-50%);
  font-size:1.1rem; line-height:1;
  color:var(--released-col);
  filter: drop-shadow(0 0 4px rgba(90,170,90,0.6));
  z-index:200;
`;
nowArrow.textContent = '▼';
canvas.appendChild(nowArrow);

// label above the stem
const nowLbl = document.createElement('div');
nowLbl.style.cssText = `
  position:absolute;
  left:${nowX}px; top:${TRACK_TOP - 76}px;
  transform:translateX(-50%);
  background:rgba(26,46,26,0.95);
  border:1px solid var(--released-col);
  color:var(--released-col);
  font-size:0.63rem; padding:3px 8px;
  border-radius:3px;
  font-family:'Courier New',monospace;
  white-space:nowrap;
  box-shadow:0 0 8px rgba(90,170,90,0.2);
  z-index:200;
`;
nowLbl.textContent = 'We are here — ' + fmtDate('2004-09-07');
canvas.appendChild(nowLbl);

// (future progress marker removed)

// ─────────────────────────────────────────
// AUTO-STAGGER: bounding-box collision avoidance
//
// Each card has an estimated size. We track every placed card's
// full bounding box and bump a new card further from the track
// until it no longer overlaps anything already placed on that side.
// ─────────────────────────────────────────

// Estimated card dimensions (px).
// Nodes are centred on x; height measured from dot outward.
const NODE_W    = 90;   // card width
const NODE_H    = 105;  // card height (img + title + date + rn)
const MIN_STEM  = 60;   // shortest allowed stem
const STEP      = 70;   // how far to push out per attempt
const MAX_TRIES = 8;
const X_PAD     = 6;    // extra horizontal breathing room

// Placed bounding boxes, keyed by side.
// Each box: { x1, x2, y1, y2 } in canvas absolute coords.
// above cards: dot at bottom of card (y2 = TRACK_TOP - stem),
//              card body extends upward  (y1 = y2 - NODE_H)
// below cards: dot at top of card    (y1 = TRACK_TOP + stem),
//              card body extends down  (y2 = y1 + NODE_H)
const boxes = { above: [], below: [] };

function assignOffset(x, side, preferredOff) {
  const half = NODE_W / 2 + X_PAD;
  let off = Math.max(MIN_STEM, preferredOff);

  for (let t = 0; t < MAX_TRIES; t++) {
    let y1, y2;
    if (side === 'above') {
      y2 = TRACK_TOP - off;          // dot sits here
      y1 = y2 - NODE_H;              // card extends upward
    } else {
      y1 = TRACK_TOP + off;          // dot sits here
      y2 = y1 + NODE_H;              // card extends downward
    }
    const x1 = x - half;
    const x2 = x + half;

    const clash = boxes[side].some(b =>
      x2 > b.x1 && x1 < b.x2 &&     // X overlap
      y2 > b.y1 && y1 < b.y2         // Y overlap
    );

    if (!clash) {
      boxes[side].push({ x1, x2, y1, y2 });
      return off;
    }
    off += STEP;
  }

  // Give up — just register and return whatever offset we ended on
  const y1f = side === 'above' ? TRACK_TOP - off - NODE_H : TRACK_TOP + off;
  const y2f = side === 'above' ? TRACK_TOP - off           : TRACK_TOP + off + NODE_H;
  boxes[side].push({ x1: x - half, x2: x + half, y1: y1f, y2: y2f });
  return off;
}

// Sort left-to-right so nearby events are processed together
const sortedEvents = [...EVENTS].sort((a, b) => dateToPx(a.date) - dateToPx(b.date));

sortedEvents.forEach(ev => {
  const x     = dateToPx(ev.date);
  const above = ev.side === 'above';
  const off   = assignOffset(x, ev.side, ev.offset || 100);

  // stem connector
  const conn = document.createElement('div');
  conn.className = 'connector';
  conn.style.left = x + 'px';
  if (above) {
    conn.style.top    = (TRACK_TOP - off) + 'px';
    conn.style.height = off + 'px';
  } else {
    conn.style.top    = TRACK_TOP + 'px';
    conn.style.height = off + 'px';
  }
  canvas.appendChild(conn);

  // colour connector stem only for upcoming events
  const isUpcoming = ev.status === 'upcoming';
  if (isUpcoming && ev.revColor) {
    conn.style.width = '2px';
    conn.style.background = ev.revColor;
  }

  // card node
  const node = document.createElement('div');
  node.className = `event-node ${ev.status}`;
  node.style.left = x + 'px';
  // No left border — removed per design

  const title = `<div class="event-title">${ev.title}</div>`;
  const date  = `<div class="event-date">${fmtDate(ev.date)}</div>`;
  const rn    = ev.releaseNote ? `<div class="release-note" style="${isUpcoming && ev.revColor ? `color:${ev.revColor}` : ''}">${ev.releaseNote}</div>` : '';
  const img   = ev.img ? `<img class="event-img" src="${ev.img}" alt="" onerror="this.style.display='none'">` : '';
  const dot   = `<div class="event-dot ${ev.status}" style="${isUpcoming && ev.revColor ? `background:${ev.revColor};box-shadow:0 0 6px ${ev.revColor}` : ''}"></div>`;

  if (above) {
    // dot at bottom, card body above — position top edge, grow downward via transform
    node.style.top       = (TRACK_TOP - off) + 'px';
    node.style.transform = 'translate(-50%, -100%)';
    node.innerHTML = dot + img + title + date + rn;
  } else {
    // dot at top, card body below
    node.style.top       = (TRACK_TOP + off) + 'px';
    node.style.transform = 'translate(-50%, 0%)';
    node.innerHTML = img + title + date + rn + dot;
  }

  node.addEventListener('mouseenter', (e) => showTip(e, ev));
  node.addEventListener('mousemove',  (e) => moveTip(e));
  node.addEventListener('mouseleave', hideTip);
  if (ev.newsUrl) {
    node.style.cursor = 'pointer';
    node.addEventListener('click', () => window.open(ev.newsUrl, '_blank'));
  }

  canvas.appendChild(node);
});

// Canvas is sized to outer.clientHeight — no resize needed.

// ─────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────
const tip  = document.getElementById('tooltip');
const ttT  = document.getElementById('tt-title');
const ttD  = document.getElementById('tt-date');
const ttDe = document.getElementById('tt-desc');
const ttTg = document.getElementById('tt-tag');

function showTip(e, ev) {
  ttT.textContent  = ev.title;
  ttD.textContent  = fmtDate(ev.date) + (ev.rev ? `  ·  Rev ${ev.rev}` : '');
  ttDe.textContent = ev.desc || '';
  ttTg.innerHTML   = `<span class="tooltip-tag ${ev.tag}">${ev.tag}</span>` +
    (ev.status === 'major' ? ' <span class="tooltip-tag major">major</span>' : '') +
    (ev.status === 'upcoming' ? ' <span class="tooltip-tag" style="background:#2a1a0a;color:#c8801a;border:1px solid #503010;">upcoming</span>' : '') +
    (ev.newsUrl ? ' <span class="tooltip-tag" style="background:#0a1a2a;color:#6ab0e8;border:1px solid #1a4060;">↗ click to open news post</span>' : '');
  tip.classList.add('visible');
  moveTip(e);
}
function moveTip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 260 > window.innerWidth)  x = e.clientX - 260;
  if (y + 150 > window.innerHeight) y = e.clientY - 150;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() { tip.classList.remove('visible'); }

// ─────────────────────────────────────────
// DRAG TO SCROLL
// ─────────────────────────────────────────
let isDown = false, startX, startY, scrollLeft, panY = 0;

function applyPanY() {
  // Allow panning into the extra padding so nodes can reach the screen edge
  const maxPan =  EXTRA_PAD * zoomLevel;
  const minPan = -(canvas.offsetHeight * zoomLevel - outer.clientHeight) - EXTRA_PAD * zoomLevel;
  panY = Math.min(maxPan, Math.max(minPan, panY));
  canvas.style.marginTop = panY + 'px';
}

outer.addEventListener('mousedown', e => {
  isDown = true; outer.style.cursor = 'grabbing';
  startX     = e.pageX - outer.offsetLeft;
  startY     = e.pageY;
  scrollLeft = outer.scrollLeft;
});
outer.addEventListener('mouseleave', () => { isDown = false; outer.style.cursor = 'grab'; });
outer.addEventListener('mouseup',    () => { isDown = false; outer.style.cursor = 'grab'; });
outer.addEventListener('mousemove',  e => {
  if (!isDown) return;
  e.preventDefault();
  const walkX = (e.pageX - outer.offsetLeft - startX) * 1.2;
  outer.scrollLeft = scrollLeft - walkX;
  panY += e.pageY - startY;
  startY = e.pageY;
  applyPanY();
});

// ─────────────────────────────────────────
// ZOOM
// ─────────────────────────────────────────
let zoomLevel = 1.0;
const ZOOM_MIN = 0.3;
const ZOOM_MAX = 2.5;

canvas.style.transformOrigin = 'top left';

// A spacer div that stretches the scrollable area to match scaled canvas width
const spacer = document.createElement('div');
spacer.style.cssText = 'position:absolute;top:0;left:0;height:1px;pointer-events:none;';
outer.appendChild(spacer);

function applyZoom() {
  canvas.style.transform = `scale(${zoomLevel})`;
  spacer.style.width = Math.ceil(TOTAL_PX * zoomLevel) + 'px';
  document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
  applyPanY();
}

function zoom(delta, anchorX) {
  const prev = zoomLevel;
  zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel + delta));
  if (zoomLevel === prev) return;
  const ax = anchorX !== undefined ? anchorX : outer.clientWidth / 2;
  const contentX = (outer.scrollLeft + ax) / prev;
  applyZoom();
  outer.scrollLeft = contentX * zoomLevel - ax;
}

// On load: pan so track line sits at ~45% down the viewport (room for below-cards)
panY = -(TRACK_TOP - Math.round(outer.clientHeight * 0.45));
applyZoom();

// Scroll to show RS2 launch area on load
outer.scrollLeft = dateToPx(new Date(2004, 2, 1)) * zoomLevel - 60;

// Mouse wheel zoom
outer.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.12 : -0.12;
  const rect = outer.getBoundingClientRect();
  zoom(delta, e.clientX - rect.left);
}, { passive: false });
</script>
