<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarlicHQ Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent !important;
    width: 681px;
    height: 167px;
    overflow: hidden;
    font-family: 'Cinzel', serif;
  }

  #overlay {
    display: flex;
    flex-direction: column;
    width: 681px;
    height: 167px;
  }

  /* ── Header bar ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0a0802;
    border: 1px solid rgba(201,162,39,0.5);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 8px 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  #logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #logo img {
    width: 24px;
    height: 24px;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 4px rgba(201,162,39,0.8));
  }

  #logo-text {
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: rgba(201,162,39,0.7);
    text-transform: uppercase;
  }

  #rank-title {
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: #c8a84b;
    text-align: right;
    transition: color 0.5s;
  }

  /* ── Task card ── */
  #task-card {
    background: #0a0802;
    border: 1px solid rgba(201,162,39,0.5);
    border-top: 1px solid rgba(201,162,39,0.2);
    border-bottom: none;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-height: 0;
  }

  #task-img-wrap {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #task-img {
    max-width: 48px;
    max-height: 48px;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 5px rgba(201,162,39,0.8)) drop-shadow(0 0 12px rgba(201,162,39,0.4));
    display: none;
  }

  #task-icon {
    font-size: 32px;
    display: none;
  }

  #task-text { flex: 1; min-width: 0; }

  #task-badge {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(201,162,39,0.6);
    margin-bottom: 4px;
  }

  #task-title {
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    color: #f5d76e;
    line-height: 1.3;
    text-shadow: 0 0 12px rgba(201,162,39,0.4);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #task-desc {
    font-size: 0.72rem;
    color: rgba(201,162,39,0.5);
    letter-spacing: 0.04em;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Stats bar ── */
  #stats-bar {
    display: flex;
    background: #0a0802;
    border: 1px solid rgba(201,162,39,0.5);
    border-top: 1px solid rgba(201,162,39,0.15);
    border-radius: 0 0 8px 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 7px 8px;
    position: relative;
  }

  .stat + .stat::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: rgba(201,162,39,0.2);
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(201,162,39,0.45);
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 1rem;
    color: #c9a227;
    letter-spacing: 0.05em;
  }

  .stat-value.streak { color: #e07070; }
  .stat-value.points { color: #f0cc6e; }

  /* ── Rank title glow animations ── */
  .glow-rank-1 { color: #a0a0a0; animation: g1 2s ease-in-out infinite; }
  .glow-rank-2 { color: #c8a84b; animation: g2 2s ease-in-out infinite; }
  .glow-rank-3 { color: #4bc8a0; animation: g3 2s ease-in-out infinite; }
  .glow-rank-4 { color: #4b8ec8; animation: g4 2s ease-in-out infinite; }
  .glow-rank-5 { color: #c84b4b; animation: g5 2s ease-in-out infinite; }
  .glow-rank-6 { color: #c84bc8; animation: g6 2s ease-in-out infinite; }
  @keyframes g1 { 0%,100%{text-shadow:0 0 4px #a0a0a0,0 0 12px rgba(160,160,160,.9),0 0 28px rgba(160,160,160,.6)} 50%{text-shadow:0 0 8px #fff,0 0 20px rgba(160,160,160,1),0 0 45px rgba(160,160,160,.8),0 0 80px rgba(160,160,160,.5)} }
  @keyframes g2 { 0%,100%{text-shadow:0 0 4px #f0cc6e,0 0 12px rgba(200,168,75,.9),0 0 28px rgba(200,168,75,.6)} 50%{text-shadow:0 0 8px #fff8c0,0 0 20px rgba(200,168,75,1),0 0 45px rgba(200,168,75,.8),0 0 80px rgba(200,168,75,.5)} }
  @keyframes g3 { 0%,100%{text-shadow:0 0 4px #4bc8a0,0 0 12px rgba(75,200,160,.9),0 0 28px rgba(75,200,160,.6)} 50%{text-shadow:0 0 8px #afffea,0 0 20px rgba(75,200,160,1),0 0 45px rgba(75,200,160,.8),0 0 80px rgba(75,200,160,.5)} }
  @keyframes g4 { 0%,100%{text-shadow:0 0 4px #4b8ec8,0 0 12px rgba(75,142,200,.9),0 0 28px rgba(75,142,200,.6)} 50%{text-shadow:0 0 8px #b0d8ff,0 0 20px rgba(75,142,200,1),0 0 45px rgba(75,142,200,.8),0 0 80px rgba(75,142,200,.5)} }
  @keyframes g5 { 0%,100%{text-shadow:0 0 4px #c84b4b,0 0 12px rgba(200,75,75,.9),0 0 28px rgba(200,75,75,.6)} 50%{text-shadow:0 0 8px #ffb0b0,0 0 20px rgba(200,75,75,1),0 0 45px rgba(200,75,75,.8),0 0 80px rgba(200,75,75,.5)} }
  @keyframes g6 { 0%,100%{text-shadow:0 0 4px #c84bc8,0 0 12px rgba(200,75,200,.9),0 0 28px rgba(200,75,200,.6)} 50%{text-shadow:0 0 8px #ffb0ff,0 0 20px rgba(200,75,200,1),0 0 45px rgba(200,75,200,.8),0 0 80px rgba(200,75,200,.5)} }
</style>
</head>
<body>

<div id="overlay">
  <div id="header">
    <div id="logo">
      <img src="https://raw.githubusercontent.com/Garlic04/GarlicHQ/main/garlicman.png" alt="">
      <span id="logo-text">GarlicHQ</span>
    </div>
    <div id="rank-title">— Wanderer —</div>
  </div>

  <div id="task-card">
    <div id="task-img-wrap">
      <img id="task-img" src="" alt="">
      <span id="task-icon">⚔️</span>
    </div>
    <div id="task-text">
      <div id="task-badge">Combat</div>
      <div id="task-title" id="no-task">No active task</div>
      <div id="task-desc"></div>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat">
      <div class="stat-label">Tasks</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Streak</div>
      <div class="stat-value streak" id="stat-streak">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Points</div>
      <div class="stat-value points" id="stat-points">0</div>
    </div>
    <div class="stat" id="kill-stat" style="display:none;">
      <div class="stat-label" id="kill-label">Kills</div>
      <div class="stat-value" id="stat-kills" style="color:#4bc8a0;">0</div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://lostcity-hiscores.nehughes97.workers.dev';
const RELAY_KEY  = new URLSearchParams(window.location.search).get('key') || '';

const TITLES = [
  { tasks: 0,   label: '— Wanderer —',   cls: 'rank-1' },
  { tasks: 10,  label: '— Adventurer —', cls: 'rank-2' },
  { tasks: 50,  label: '— Veteran —',    cls: 'rank-3' },
  { tasks: 150, label: '— Champion —',   cls: 'rank-4' },
  { tasks: 350, label: '— Hero —',       cls: 'rank-5' },
  { tasks: 750, label: '— Legend —',     cls: 'rank-6' },
];

function getTitle(total) {
  let t = TITLES[0];
  for (const r of TITLES) { if (total >= r.tasks) t = r; }
  return t;
}

async function refresh() {
  try {
    const res  = await fetch(`${WORKER_URL}/task?key=${RELAY_KEY}`);
    const data = await res.json();

    const tracker     = data.tracker || {};
    const currentTask = data.task    || null;

    const total     = tracker.total     || 0;
    const hw        = tracker.highWater || total;
    const streak    = tracker.streak    || 0;
    const points    = tracker.points    || 0;
    const bossKills = tracker.bossKills || 0;

    // Stats
    document.getElementById('stat-total').textContent  = total;
    document.getElementById('stat-streak').textContent = streak;
    document.getElementById('stat-points').textContent = points.toLocaleString();

    // Rank title
    const t       = getTitle(hw);
    const titleEl = document.getElementById('rank-title');
    titleEl.textContent = t.label;
    titleEl.className   = bossKills >= 10 ? 'glow-' + t.cls : '';
    titleEl.style.color = bossKills >= 10 ? '' : {
      'rank-1':'#a0a0a0','rank-2':'#c8a84b','rank-3':'#4bc8a0',
      'rank-4':'#4b8ec8','rank-5':'#c84b4b','rank-6':'#c84bc8'
    }[t.cls];

    // Task
    const badgeEl = document.getElementById('task-badge');
    const titleTx = document.getElementById('task-title');
    const descEl  = document.getElementById('task-desc');
    const imgEl   = document.getElementById('task-img');
    const iconEl  = document.getElementById('task-icon');

    if (currentTask) {
      badgeEl.textContent = currentTask.chain ? '⚔ Challenge' :
                            currentTask.type === 'quest'  ? '📜 Quest'  :
                            currentTask.type === 'clue'   ? '🗺 Clue'   :
                            currentTask.type === 'skill'  ? '🛠 Skill'  : '⚔ Combat';
      titleTx.textContent = currentTask.title || '';
      descEl.textContent  = currentTask.chain
        ? (currentTask.chain.step1?.title || '') + ' → ' + (currentTask.chain.step2?.title || '')
        : currentTask.desc || '';

      const wikiKey = currentTask.npcImage || currentTask.itemImage;
      imgEl.style.display  = 'none';
      iconEl.style.display = 'none';
      if (wikiKey) {
        imgEl.src = `https://oldschool.runescape.wiki/images/${wikiKey}.png`;
        imgEl.onload  = () => { imgEl.style.display = 'block'; iconEl.style.display = 'none'; };
        imgEl.onerror = () => { imgEl.style.display = 'none'; iconEl.textContent = currentTask.icon || '⚔️'; iconEl.style.display = 'block'; };
      } else {
        iconEl.textContent   = currentTask.icon || '⚔️';
        iconEl.style.display = 'block';
      }
    } else {
      badgeEl.textContent  = '';
      titleTx.textContent  = 'No active task';
      descEl.textContent   = 'Generate a task to get started!';
      imgEl.style.display  = 'none';
      iconEl.textContent   = '⚔️';
      iconEl.style.display = 'block';
    }
    // Kill counter
    const killCount  = data.killCount  || 0;
    const killTarget = data.killTarget || 0;
    const killStat   = document.getElementById('kill-stat');
    const killLabel  = document.getElementById('kill-label');
    const killVal    = document.getElementById('stat-kills');
    if (killTarget > 1 && currentTask) {
      killStat.style.display = 'flex';
      const isAgility = currentTask.skill === 'agility';
      killLabel.textContent = isAgility ? 'Laps' : 'Kills';
      killVal.textContent   = `${killCount} / ${killTarget}`;
      killVal.style.color   = killCount >= killTarget ? '#4bc8a0' : '#e07070';
    } else {
      killStat.style.display = 'none';
    }
  } catch(e) {
    console.warn('Overlay refresh error:', e);
  }
}

refresh();
setInterval(refresh, 2000);

if (!RELAY_KEY) {
  document.getElementById('task-title').textContent = 'No stream key set';
  document.getElementById('task-desc').textContent  = 'Set a key in Stats → streaming on the task generator';
}
</script>
</body>
</html>
