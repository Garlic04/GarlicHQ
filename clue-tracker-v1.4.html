<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clue Scroll Tracker — Garlic</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .item-img { width: 36px; height: 36px; object-fit: contain; image-rendering: pixelated; }
  .item-emoji { font-size: 1.6rem; line-height: 1; }
</style>
</head>
<body data-theme="dark" class="min-h-screen">

<div class="navbar bg-base-200 px-4">
  <div class="flex-1">
    <a href="index.html" class="text-sm opacity-50 hover:opacity-100">← Garlic</a>
    <span class="mx-2 opacity-30">/</span>
    <span class="text-sm">Clue Scroll Tracker</span>
  </div>
  <div class="flex-none">
    <select class="select select-sm select-bordered" onchange="document.body.setAttribute('data-theme', this.value)">
      <option value="dark">dark</option>
      <option value="light">light</option>
      <option value="cupcake">cupcake</option>
      <option value="bumblebee">bumblebee</option>
      <option value="synthwave">synthwave</option>
      <option value="retro">retro</option>
      <option value="cyberpunk">cyberpunk</option>
      <option value="halloween">halloween</option>
      <option value="forest">forest</option>
      <option value="luxury">luxury</option>
      <option value="dracula">dracula</option>
      <option value="night">night</option>
      <option value="coffee">coffee</option>
    </select>
  </div>
</div>

<div class="p-6 max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold text-center mb-1">Clue Scroll Tracker</h1>
  <p class="text-center opacity-50 text-sm mb-6">Track your unique rewards from clue scrolls</p>



  <!-- EASY -->
  <div class="tier-panel card bg-base-200 shadow p-4 mb-4" id="panel-easy">
    <div class="flex justify-between items-center mb-4">
      <div>
        <h2 class="text-lg font-semibold">Easy Clue Rewards</h2>
        <div class="flex items-center gap-3 mt-1">
          <p class="text-sm opacity-60 whitespace-nowrap" id="progress-easy"><span>0</span> / 13</p>
          <progress class="progress progress-accent w-48" id="bar-easy" value="0" max="13"></progress>
        </div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="resetTier('easy')">Reset</button>
    </div>
    <div class="item-grid grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2" id="grid-easy"></div>
  </div>

  <!-- MEDIUM -->
  <div class="tier-panel card bg-base-200 shadow p-4 mb-4" id="panel-medium">
    <div class="flex justify-between items-center mb-4">
      <div>
        <h2 class="text-lg font-semibold">Medium Clue Rewards</h2>
        <div class="flex items-center gap-3 mt-1">
          <p class="text-sm opacity-60 whitespace-nowrap" id="progress-medium"><span>0</span> / 12</p>
          <progress class="progress progress-accent w-48" id="bar-medium" value="0" max="12"></progress>
        </div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="resetTier('medium')">Reset</button>
    </div>
    <div class="item-grid grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2" id="grid-medium"></div>
  </div>

  <!-- HARD -->
  <div class="tier-panel card bg-base-200 shadow p-4 mb-4" id="panel-hard">
    <div class="flex justify-between items-center mb-4">
      <div>
        <h2 class="text-lg font-semibold">Hard Clue Rewards</h2>
        <div class="flex items-center gap-3 mt-1">
          <p class="text-sm opacity-60 whitespace-nowrap" id="progress-hard"><span>0</span> / 25</p>
          <progress class="progress progress-accent w-48" id="bar-hard" value="0" max="25"></progress>
        </div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="resetTier('hard')">Reset</button>
    </div>
    <div class="item-grid grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2" id="grid-hard"></div>
  </div>
</div>

<div id="toast" class="toast toast-bottom toast-center hidden">
  <div class="alert alert-success text-sm" id="toast-msg"></div>
</div>


<dialog id="item-popup" class="modal">
  <div class="modal-box text-center">
    <h3 class="font-bold text-lg mb-1" id="popup-name"></h3>
    <img class="item-img mx-auto my-2" id="popup-img" src="" alt="">
    <div class="text-4xl font-bold my-2" id="popup-count">1</div>
    <p class="text-sm opacity-50 mb-4">times obtained</p>
    <div class="flex gap-3 justify-center mb-4">
      <button class="btn btn-error btn-outline" onclick="popupAdjust(-1)">− Remove</button>
      <button class="btn btn-success btn-outline" onclick="popupAdjust(1)">+ Add</button>
    </div>
    <div class="modal-action justify-center">
      <button class="btn btn-sm btn-ghost" onclick="closePopup()">Close</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button onclick="closePopup()">close</button></form>
</dialog>

<script>
const REWARDS = {
  easy: [
    { id: 'black_platebody_t',  name: 'Black Platebody (t)',  img: 'Black_platebody_(t)' },
    { id: 'black_platelegs_t',  name: 'Black Platelegs (t)',  img: 'Black_platelegs_(t)' },
    { id: 'black_full_helm_t',  name: 'Black Full Helm (t)',  img: 'Black_full_helm_(t)' },
    { id: 'black_kiteshield_t', name: 'Black Kiteshield (t)', img: 'Black_kiteshield_(t)' },
    { id: 'black_platebody_g',  name: 'Black Platebody (g)',  img: 'Black_platebody_(g)' },
    { id: 'black_platelegs_g',  name: 'Black Platelegs (g)',  img: 'Black_platelegs_(g)' },
    { id: 'black_full_helm_g',  name: 'Black Full Helm (g)',  img: 'Black_full_helm_(g)' },
    { id: 'black_kiteshield_g', name: 'Black Kiteshield (g)', img: 'Black_kiteshield_(g)' },
    { id: 'highwayman_mask',    name: 'Highwayman Mask',      img: 'Highwayman_mask' },
    { id: 'blue_beret',         name: 'Blue Beret',           img: 'Blue_beret' },
    { id: 'black_beret',        name: 'Black Beret',          img: 'Black_beret' },
    { id: 'white_beret',        name: 'White Beret',          img: 'White_beret' },
    { id: 'wizard_boots',       name: 'Wizard Boots',         img: 'Wizard_boots' },
  ],
  medium: [
    { id: 'ranger_boots',        name: 'Ranger Boots',         img: 'Ranger_boots' },
    { id: 'adamant_full_helm_t', name: 'Adamant Full Helm (t)',img: 'Adamant_full_helm_(t)' },
    { id: 'adamant_platebody_t', name: 'Adamant Platebody (t)',img: 'Adamant_platebody_(t)' },
    { id: 'adamant_platelegs_t', name: 'Adamant Platelegs (t)',img: 'Adamant_platelegs_(t)' },
    { id: 'adamant_kite_t',      name: 'Adamant Kiteshield (t)',img: 'Adamant_kiteshield_(t)' },
    { id: 'adamant_full_helm_g', name: 'Adamant Full Helm (g)',img: 'Adamant_full_helm_(g)' },
    { id: 'adamant_platebody_g', name: 'Adamant Platebody (g)',img: 'Adamant_platebody_(g)' },
    { id: 'adamant_platelegs_g', name: 'Adamant Platelegs (g)',img: 'Adamant_platelegs_(g)' },
    { id: 'adamant_kite_g',      name: 'Adamant Kiteshield (g)',img: 'Adamant_kiteshield_(g)' },
    { id: 'red_headband',        name: 'Red Headband',          img: 'Red_headband' },
    { id: 'black_headband',      name: 'Black Headband',        img: 'Black_headband' },
    { id: 'brown_headband',      name: 'Brown Headband',        img: 'Brown_headband' },
  ],
  hard: [
    { id: 'robin_hood_hat',      name: "Robin Hood Hat",        img: 'Robin_hood_hat' },
    { id: 'rune_full_helm_t',    name: 'Rune Full Helm (t)',    img: 'Rune_full_helm_(t)' },
    { id: 'rune_platebody_t',    name: 'Rune Platebody (t)',    img: 'Rune_platebody_(t)' },
    { id: 'rune_platelegs_t',    name: 'Rune Platelegs (t)',    img: 'Rune_platelegs_(t)' },
    { id: 'rune_kiteshield_t',   name: 'Rune Kiteshield (t)',   img: 'Rune_kiteshield_(t)' },
    { id: 'rune_full_helm_g',    name: 'Rune Full Helm (g)',    img: 'Rune_full_helm_(g)' },
    { id: 'rune_platebody_g',    name: 'Rune Platebody (g)',    img: 'Rune_platebody_(g)' },
    { id: 'rune_platelegs_g',    name: 'Rune Platelegs (g)',    img: 'Rune_platelegs_(g)' },
    { id: 'rune_kiteshield_g',   name: 'Rune Kiteshield (g)',   img: 'Rune_kiteshield_(g)' },
    { id: 'pirates_hat',         name: "Pirate's Hat",          img: 'Pirates_hat' },
    { id: 'tan_cavalier',        name: 'Tan Cavalier',          img: 'Tan_cavalier' },
    { id: 'dark_cavalier',       name: 'Dark Cavalier',         img: 'Dark_cavalier' },
    { id: 'black_cavalier',      name: 'Black Cavalier',        img: 'Black_cavalier' },
    { id: 'zamorak_full_helm',   name: 'Zamorak Full Helm',     img: 'Zamorak_full_helm' },
    { id: 'zamorak_platebody',   name: 'Zamorak Platebody',     img: 'Zamorak_platebody' },
    { id: 'zamorak_platelegs',   name: 'Zamorak Platelegs',     img: 'Zamorak_platelegs' },
    { id: 'zamorak_kiteshield',  name: 'Zamorak Kiteshield',    img: 'Zamorak_kiteshield' },
    { id: 'guthix_full_helm',    name: 'Guthix Full Helm',      img: 'Guthix_full_helm' },
    { id: 'guthix_platebody',    name: 'Guthix Platebody',      img: 'Guthix_platebody' },
    { id: 'guthix_platelegs',    name: 'Guthix Platelegs',      img: 'Guthix_platelegs' },
    { id: 'guthix_kiteshield',   name: 'Guthix Kiteshield',     img: 'Guthix_kiteshield' },
    { id: 'saradomin_full_helm', name: 'Saradomin Full Helm',   img: 'Saradomin_full_helm' },
    { id: 'saradomin_platebody', name: 'Saradomin Platebody',   img: 'Saradomin_platebody' },
    { id: 'saradomin_platelegs', name: 'Saradomin Platelegs',   img: 'Saradomin_platelegs' },
    { id: 'saradomin_kiteshield',name: 'Saradomin Kiteshield',  img: 'Saradomin_kiteshield' },
  ],
};

// State: obtained = Set of obtained ids, counts = {id: number}
const state = {
  easy:   { obtained: new Set(JSON.parse(localStorage.getItem('clue-easy-obt')   || '[]')), counts: JSON.parse(localStorage.getItem('clue-easy-cnt')   || '{}') },
  medium: { obtained: new Set(JSON.parse(localStorage.getItem('clue-medium-obt') || '[]')), counts: JSON.parse(localStorage.getItem('clue-medium-cnt') || '{}') },
  hard:   { obtained: new Set(JSON.parse(localStorage.getItem('clue-hard-obt')   || '[]')), counts: JSON.parse(localStorage.getItem('clue-hard-cnt')   || '{}') },
};

function saveState() {
  ['easy','medium','hard'].forEach(tier => {
    localStorage.setItem('clue-' + tier + '-obt', JSON.stringify([...state[tier].obtained]));
    localStorage.setItem('clue-' + tier + '-cnt', JSON.stringify(state[tier].counts));
  });
}

function buildGrid(tier) {
  const grid = document.getElementById('grid-' + tier);
  grid.innerHTML = '';
  for (const item of REWARDS[tier]) {
    const card = document.createElement('div');
    const isObtained = state[tier].obtained.has(item.id);
    const count = state[tier].counts[item.id] || 1;
    card.className = 'card card-compact bg-base-200 cursor-pointer border-2 transition-all text-center p-2 relative ' + (isObtained ? 'border-primary opacity-100' : 'border-transparent opacity-60 hover:opacity-100');
    card.dataset.id = item.id;

    const imgEl = document.createElement('img');
    imgEl.className = 'item-img';
    imgEl.src = `images/${item.img}.png`;
    imgEl.alt = item.name;
    imgEl.onerror = function() {
      this.style.display = 'none';
      const em = document.createElement('span');
      em.className = 'item-emoji';
      em.textContent = '🗡️';
      card.insertBefore(em, card.firstChild);
    };

    const name = document.createElement('div');
    name.className = 'text-xs mt-1 leading-tight';
    name.textContent = item.name;

    card.appendChild(imgEl);
    card.appendChild(name);
    if (isObtained) {
      const check = document.createElement('div');
      check.className = 'badge badge-primary badge-sm absolute top-1 right-1';
      check.textContent = count > 1 ? 'x' + count : '✓';
      card.appendChild(check);
    }
    card.onclick = () => toggleItem(tier, item.id, card);
    grid.appendChild(card);
  }
  updateProgress(tier);
}

let popupTier = null;
let popupId = null;

function toggleItem(tier, id, card) {
  if (state[tier].obtained.has(id)) {
    // Already obtained — open popup
    openPopup(tier, id);
  } else {
    // Not obtained — mark directly
    state[tier].obtained.add(id);
    state[tier].counts[id] = 1;
    saveState();
    buildGrid(tier);
    showToast('Marked as obtained!');
  }
}

function openPopup(tier, id) {
  popupTier = tier;
  popupId = id;
  const item = REWARDS[tier].find(r => r.id === id);
  const count = state[tier].counts[id] || 1;
  document.getElementById('popup-name').textContent = item.name;
  document.getElementById('popup-count').textContent = count;
  const img = document.getElementById('popup-img');
  img.src = `images/${item.img}.png`;
  img.onerror = function() { this.style.display = 'none'; };
  img.style.display = 'block';
  document.getElementById('item-popup').showModal();
}

function popupAdjust(delta) {
  const tier = popupTier;
  const id = popupId;
  if (!tier || !id) return;

  if (delta === -1) {
    // Minus: unmark entirely
    state[tier].obtained.delete(id);
    delete state[tier].counts[id];
    saveState();
    buildGrid(tier);
    closePopup();
    showToast('Unmarked.');
  } else {
    // Plus: increment count
    state[tier].counts[id] = (state[tier].counts[id] || 1) + 1;
    document.getElementById('popup-count').textContent = state[tier].counts[id];
    saveState();
    buildGrid(tier);
    showToast('Count updated!');
  }
}

function closePopup() {
  document.getElementById('item-popup').close();
  popupTier = null;
  popupId = null;
}



function updateProgress(tier) {
  const count = state[tier].obtained.size;
  const total = REWARDS[tier].length;
  const el = document.querySelector(`#progress-${tier} span`);
  if (el) el.textContent = count;
  const bar = document.getElementById('bar-' + tier);
  if (bar) bar.value = count;
}

function resetTier(tier) {
  if (!confirm(`Reset all ${tier} clue data?`)) return;
  state[tier].obtained.clear();
  state[tier].counts = {};
  saveState();
  buildGrid(tier);
  showToast('Reset.');
}



let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toast-msg');
  m.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 2000);
}

// Init
buildGrid('easy');
buildGrid('medium');
buildGrid('hard');


</script>

<dialog id="item-popup" class="modal">
  <div class="modal-box text-center">
    <h3 class="font-bold text-lg mb-1" id="popup-name"></h3>
    <img class="item-img mx-auto my-2" id="popup-img" src="" alt="">
    <div class="text-4xl font-bold my-2" id="popup-count">1</div>
    <p class="text-sm opacity-50 mb-4">times obtained</p>
    <div class="flex gap-3 justify-center mb-4">
      <button class="btn btn-error btn-outline" onclick="popupAdjust(-1)">− Remove</button>
      <button class="btn btn-success btn-outline" onclick="popupAdjust(1)">+ Add</button>
    </div>
    <div class="modal-action justify-center">
      <button class="btn btn-sm btn-ghost" onclick="closePopup()">Close</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button onclick="closePopup()">close</button></form>
</dialog>
</body>
</html>
