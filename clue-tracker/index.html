    { id: 'rune_kiteshield_t',   name: 'Rune Kiteshield (t)',   img: 'Rune_kiteshield_(t)' },
    { id: 'rune_full_helm_g',    name: 'Rune Full Helm (g)',    img: 'Rune_full_helm_(g)' },
    { id: 'rune_platebody_g',    name: 'Rune Platebody (g)',    img: 'Rune_platebody_(g)' },
    { id: 'rune_platelegs_g',    name: 'Rune Platelegs (g)',    img: 'Rune_platelegs_(g)' },
    { id: 'rune_kiteshield_g',   name: 'Rune Kiteshield (g)',   img: 'Rune_kiteshield_(g)' },
    { id: 'pirates_hat',         name: "Pirate's Hat",          img: 'Pirates_hat', imgUrl: 'https://oldschool.runescape.wiki/w/Special:FilePath/Pirate%27s_hat.png' },
    { id: 'tan_cavalier',        name: 'Tan Cavalier',          img: 'Tan_cavalier' },
    { id: 'dark_cavalier',       name: 'Dark Cavalier',         img: 'Dark_cavalier' },
    { id: 'black_cavalier',      name: 'Black Cavalier',        img: 'Black_cavalier' },

    { id: 'zamorak_platebody',   name: 'Zamorak Platebody',     img: 'Zamorak_platebody' },
    { id: 'zamorak_platelegs',   name: 'Zamorak Platelegs',     img: 'Zamorak_platelegs' },
    { id: 'zamorak_kiteshield',  name: 'Zamorak Kiteshield',    img: 'Zamorak_kiteshield' },
    { id: 'guthix_full_helm',    name: 'Guthix Full Helm',      img: 'Guthix_full_helm' },
    { id: 'guthix_platebody',    name: 'Guthix Platebody',      img: 'Guthix_platebody' },
    { id: 'guthix_platelegs',    name: 'Guthix Platelegs',      img: 'Guthix_platelegs' },
    { id: 'guthix_kiteshield',   name: 'Guthix Kiteshield',     img: 'Guthix_kiteshield' },
    { id: 'saradomin_full_helm', name: 'Saradomin Full Helm',   img: 'Saradomin_full_helm' },
    { id: 'saradomin_platebody', name: 'Saradomin Platebody',   img: 'Saradomin_platebody' },
    { id: 'saradomin_platelegs', name: 'Saradomin Platelegs',   img: 'Saradomin_platelegs' },
    { id: 'saradomin_kiteshield',name: 'Saradomin Kiteshield',  img: 'Saradomin_kiteshield' },
  ],
};

// State: obtained = Set of obtained ids, counts = {id: number}
const state = {
  easy:   { obtained: new Set(JSON.parse(localStorage.getItem('clue-easy-obt')   || '[]')), counts: JSON.parse(localStorage.getItem('clue-easy-cnt')   || '{}') },
  medium: { obtained: new Set(JSON.parse(localStorage.getItem('clue-medium-obt') || '[]')), counts: JSON.parse(localStorage.getItem('clue-medium-cnt') || '{}') },
  hard:   { obtained: new Set(JSON.parse(localStorage.getItem('clue-hard-obt')   || '[]')), counts: JSON.parse(localStorage.getItem('clue-hard-cnt')   || '{}') },
};


// Clue completion counts
const clueCounts = {
  easy:   parseInt(localStorage.getItem('clue-done-easy')   || '0'),
  medium: parseInt(localStorage.getItem('clue-done-medium') || '0'),
  hard:   parseInt(localStorage.getItem('clue-done-hard')   || '0'),
};

function adjustCount(tier, delta) {
  clueCounts[tier] = Math.max(0, clueCounts[tier] + delta);
  localStorage.setItem('clue-done-' + tier, clueCounts[tier]);
  updateCountDisplay();
}

function updateCountDisplay() {
  ['easy', 'medium', 'hard'].forEach(tier => {
    document.getElementById('count-' + tier).textContent = clueCounts[tier];
  });
  const total = clueCounts.easy + clueCounts.medium + clueCounts.hard;
  document.getElementById('count-total').textContent = total;
}

function saveState() {
  ['easy','medium','hard'].forEach(tier => {
    localStorage.setItem('clue-' + tier + '-obt', JSON.stringify([...state[tier].obtained]));
    localStorage.setItem('clue-' + tier + '-cnt', JSON.stringify(state[tier].counts));
  });
}

function buildGrid(tier) {
  const grid = document.getElementById('grid-' + tier);
  grid.innerHTML = '';
  for (const item of REWARDS[tier]) {
    const card = document.createElement('div');
    const isObtained = state[tier].obtained.has(item.id);
    const count = state[tier].counts[item.id] || 1;
    card.className = 'card card-compact bg-base-200 cursor-pointer border-2 border-transparent transition-all text-center p-2 relative ' + (isObtained ? 'opacity-100' : 'opacity-60 hover:opacity-100');
    card.dataset.id = item.id;

    const imgEl = document.createElement('img');
    imgEl.className = 'item-img';
    imgEl.alt = item.name;
    imgEl.onerror = function() {
      const em = document.createElement('span');
      em.className = 'item-emoji';
      em.textContent = '🗡️';
      this.replaceWith(em);
    };
    imgEl.src = item.imgUrl || `https://oldschool.runescape.wiki/images/${item.img}.png`;

    const name = document.createElement('div');
    name.className = 'text-xs mt-1 leading-tight';
    name.textContent = item.name;

    card.appendChild(imgEl);
    card.appendChild(name);
    if (isObtained && count > 1) {
      const countBadge = document.createElement('div');
      countBadge.className = 'badge badge-neutral badge-sm absolute top-1 right-1';
      countBadge.textContent = 'x' + count;
      card.appendChild(countBadge);
    }
    card.onclick = () => toggleItem(tier, item.id, card);
    grid.appendChild(card);
  }
  updateProgress(tier);
}

let popupTier = null;
let popupId = null;

function toggleItem(tier, id, card) {
  if (state[tier].obtained.has(id)) {
    // Already obtained — open popup
    openPopup(tier, id);
  } else {
    // Not obtained — mark directly
    state[tier].obtained.add(id);
    state[tier].counts[id] = 1;
    saveState();
    buildGrid(tier);
    showToast('Marked as obtained!');
  }
}

function openPopup(tier, id) {
  popupTier = tier;
  popupId = id;
  const item = REWARDS[tier].find(r => r.id === id);
  const count = state[tier].counts[id] || 1;
  document.getElementById('popup-name').textContent = item.name;
  document.getElementById('popup-count').textContent = count;
  const img = document.getElementById('popup-img');
  img.src = item.imgUrl || `https://oldschool.runescape.wiki/images/${item.img}.png`;
  img.onerror = function() { this.style.display = 'none'; };
  img.style.display = 'block';
  document.getElementById('item-popup').showModal();
}

function popupAdjust(delta) {
  const tier = popupTier;
  const id = popupId;
  if (!tier || !id) return;

  if (delta === -1) {
    const current = state[tier].counts[id] || 1;
    if (current <= 1) {
      // Count would hit 0 — unmark entirely
      state[tier].obtained.delete(id);
      delete state[tier].counts[id];
      saveState();
      buildGrid(tier);
      closePopup();
      showToast('Unmarked.');
    } else {
      // Decrement count
      state[tier].counts[id] = current - 1;
      document.getElementById('popup-count').textContent = state[tier].counts[id];
      saveState();
      buildGrid(tier);
      showToast('Count updated!');
    }
  } else {
    // Plus: increment count
    state[tier].counts[id] = (state[tier].counts[id] || 1) + 1;
    document.getElementById('popup-count').textContent = state[tier].counts[id];
    saveState();
    buildGrid(tier);
    showToast('Count updated!');
  }
}

function closePopup() {
  document.getElementById('item-popup').close();
  popupTier = null;
  popupId = null;
}



function updateProgress(tier) {
  const count = state[tier].obtained.size;
  const total = REWARDS[tier].length;
  const el = document.querySelector(`#progress-${tier} span`);
  if (el) el.textContent = count;
  const bar = document.getElementById('bar-' + tier);
  if (bar) bar.value = count;
}

function resetTier(tier) {
  if (!confirm(`Reset all ${tier} clue data?`)) return;
  state[tier].obtained.clear();
  state[tier].counts = {};
  saveState();
  buildGrid(tier);
  showToast('Reset.');
}



let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toast-msg');
  m.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 2000);
}

// Init
buildGrid('easy');
buildGrid('medium');
buildGrid('hard');

function setTheme(val) {
  if (val === 'garlic') {
    document.body.setAttribute('data-theme', 'dark');
    document.body.classList.add('theme-garlic');
  } else {
    document.body.setAttribute('data-theme', val);
    document.body.classList.remove('theme-garlic');
  }
  localStorage.setItem('clue-theme', val);
}

// Restore saved theme
const savedTheme = localStorage.getItem('clue-theme') || 'garlic';
updateCountDisplay();
setTheme(savedTheme);
const sel = document.querySelector('nav .select');
if (sel) sel.value = savedTheme;
